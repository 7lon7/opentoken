server {
    listen 8080;
    listen [::]:8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    location = /logo {
        default_type image/svg+xml;
        alias /var/www/site/logo.svg;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
